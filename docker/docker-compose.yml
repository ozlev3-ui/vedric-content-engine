services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vedric}
      POSTGRES_USER: ${POSTGRES_USER:-vedric}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vedric}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ../backend
    env_file:
      - ../backend/.env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ../frontend
    env_file:
      - ../frontend/.env.local
    ports:
      - "3000:3000"
    depends_on:
      - backend

  worker:
    build:
      context: ../workers
    env_file:
      - ../workers/.env
    depends_on:
      - redis
      - postgres

volumes:
  postgres_data:
  redis_data:
